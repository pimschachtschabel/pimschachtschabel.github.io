<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pim Schachtschabel — Architect of Curiosity</title>
  <meta name="description" content="Pim Schachtschabel is an experience designer, speaker, and author who helps people and organizations design the conditions where wonder becomes possible.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    ::selection { background: #D4956A; color: white; }
    input:focus { border-color: #B86B3D !important; }
    @media (max-width: 768px) { .desktop-nav { display: none !important; } .mobile-menu-btn { display: block !important; } }
    @media (min-width: 769px) { .mobile-menu-btn { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    const COLORS = {
      bg: "#F8F4EF",
      bgAlt: "#EDE7DF",
      bgDark: "#334A40",
      bgDarkAlt: "#3F5A4E",
      text: "#2D4038",
      textLight: "#64806F",
      accent: "#B86B3D",
      accentLight: "#D4956A",
      cream: "#F8F4EF",
      white: "#FFFFFF",
      border: "#D9D0C5",
    };

    const IMG_PORTRAIT = "images/portrait.jpg";
    const IMG_TINTYPE = "images/tintype.jpg";
    const IMG_EXPO = "images/expo.jpg";
    const IMG_SHERLOCKED = "images/sherlocked.jpg";
    const IMG_WILDDINING = "images/wilddining.jpg";
    const IMG_SPEAKING_DDW = "images/speaking_ddw.jpg";
    const IMG_SPEAKING_ITW = "images/speaking_itw.jpg";
    const IMG_PANEL_ITW = "images/panel_itw.jpg";

    function useScrollReveal() {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setVisible(true); obs.unobserve(el); } },
          { threshold: 0.12 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return [ref, visible];
    }

    function Reveal({ children, delay = 0, className = "" }) {
      const [ref, visible] = useScrollReveal();
      return (
        <div ref={ref} className={className} style={{
          opacity: visible ? 1 : 0,
          transform: visible ? "translateY(0)" : "translateY(24px)",
          transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
        }}>{children}</div>
      );
    }

    function CTAButton({ children, onClick, variant = "primary" }) {
      const [hov, setHov] = useState(false);
      const isPrimary = variant === "primary";
      return (
        <button onClick={onClick} onMouseOver={() => setHov(true)} onMouseOut={() => setHov(false)}
          style={{
            background: isPrimary ? (hov ? COLORS.accentLight : COLORS.accent) : "transparent",
            color: isPrimary ? COLORS.white : (hov ? COLORS.accent : COLORS.text),
            border: isPrimary ? "none" : `1.5px solid ${hov ? COLORS.accent : COLORS.text}`,
            padding: "14px 32px", fontFamily: "'DM Sans', sans-serif",
            fontSize: 13, fontWeight: 500, letterSpacing: "0.08em",
            textTransform: "uppercase", cursor: "pointer", transition: "all 0.3s",
          }}>{children}</button>
      );
    }

    function Nav({ page, setPage }) {
      const [menuOpen, setMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 60);
        window.addEventListener("scroll", onScroll);
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      const items = [
        { id: "home", label: "Home" },
        { id: "about", label: "About" },
        { id: "speaking", label: "Speaking" },
        { id: "book", label: "Book" },
      ];
      const go = (id) => { setPage(id); setMenuOpen(false); window.scrollTo(0,0); };
      return (
        <nav style={{
          position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
          background: scrolled ? "rgba(248,244,239,0.95)" : "transparent",
          backdropFilter: scrolled ? "blur(10px)" : "none",
          borderBottom: scrolled ? `1px solid ${COLORS.border}` : "1px solid transparent",
          transition: "all 0.4s ease",
        }}>
          <div style={{
            maxWidth: 1200, margin: "0 auto", padding: "16px 32px",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <button onClick={() => go("home")} style={{
              background: "none", border: "none", cursor: "pointer", padding: 0,
              fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 600,
              color: COLORS.text, letterSpacing: "0.02em",
            }}>Pim Schachtschabel</button>
            <div style={{ display: "flex", gap: 32, alignItems: "center" }} className="desktop-nav">
              {items.filter(i => i.id !== "home").map(item => (
                <button key={item.id} onClick={() => go(item.id)} style={{
                  background: "none", border: "none", cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 400,
                  color: page === item.id ? COLORS.accent : COLORS.textLight,
                  letterSpacing: "0.06em", textTransform: "uppercase",
                  borderBottom: page === item.id ? `2px solid ${COLORS.accent}` : "2px solid transparent",
                  paddingBottom: 4, transition: "all 0.3s",
                }}>{item.label}</button>
              ))}
              <button onClick={() => go("speaking")} style={{
                background: COLORS.accent, color: COLORS.white, border: "none",
                padding: "10px 24px", fontFamily: "'DM Sans', sans-serif",
                fontSize: 13, fontWeight: 500, letterSpacing: "0.06em",
                textTransform: "uppercase", cursor: "pointer", transition: "background 0.3s",
              }}
                onMouseOver={e => e.target.style.background = COLORS.accentLight}
                onMouseOut={e => e.target.style.background = COLORS.accent}
              >Book Pim</button>
            </div>
            <button className="mobile-menu-btn" onClick={() => setMenuOpen(!menuOpen)} style={{
              display: "none", background: "none", border: "none", cursor: "pointer", padding: 8,
            }}>
              <div style={{ width: 24, height: 2, background: COLORS.text, marginBottom: 6, transition: "all 0.3s", transform: menuOpen ? "rotate(45deg) translate(5px, 5px)" : "none" }} />
              <div style={{ width: 24, height: 2, background: COLORS.text, marginBottom: 6, opacity: menuOpen ? 0 : 1, transition: "all 0.3s" }} />
              <div style={{ width: 24, height: 2, background: COLORS.text, transition: "all 0.3s", transform: menuOpen ? "rotate(-45deg) translate(5px, -5px)" : "none" }} />
            </button>
          </div>
          {menuOpen && (
            <div style={{ background: COLORS.bg, padding: "16px 32px 32px", borderBottom: `1px solid ${COLORS.border}` }}>
              {items.map(item => (
                <button key={item.id} onClick={() => go(item.id)} style={{
                  display: "block", width: "100%", textAlign: "left",
                  background: "none", border: "none", cursor: "pointer",
                  fontFamily: "'DM Sans', sans-serif", fontSize: 16,
                  color: page === item.id ? COLORS.accent : COLORS.text,
                  padding: "12px 0", borderBottom: `1px solid ${COLORS.border}`,
                }}>{item.label}</button>
              ))}
            </div>
          )}
        </nav>
      );
    }

    // ============ HOMEPAGE ============
    function HomePage({ setPage }) {
      return (
        <div>
          {/* Hero with portrait */}
          <section style={{
            minHeight: "100vh", display: "flex", alignItems: "center",
            padding: "120px 32px 80px", maxWidth: 1100, margin: "0 auto",
          }}>
            <div style={{ display: "flex", gap: 64, alignItems: "center", flexWrap: "wrap", width: "100%" }}>
              <div style={{ flex: "1 1 400px" }}>
                <Reveal>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
                    letterSpacing: "0.12em", textTransform: "uppercase", color: COLORS.accent,
                    marginBottom: 24,
                  }}>Architect of Curiosity</p>
                </Reveal>
                <Reveal delay={0.15}>
                  <h1 style={{
                    fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(32px, 5vw, 56px)",
                    fontWeight: 300, lineHeight: 1.15, color: COLORS.text,
                    marginBottom: 32, fontStyle: "italic",
                  }}>What if curiosity isn't something you find — but something you build?</h1>
                </Reveal>
                <Reveal delay={0.3}>
                  <p style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 17, lineHeight: 1.7,
                    color: COLORS.textLight, maxWidth: 520, marginBottom: 40,
                  }}>I'm Pim Schachtschabel — an experience designer, speaker, and author who helps people and organizations design the conditions where wonder becomes possible.</p>
                </Reveal>
                <Reveal delay={0.45}>
                  <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                    <CTAButton onClick={() => { setPage("speaking"); window.scrollTo(0,0); }}>Book Pim to Speak</CTAButton>
                    <CTAButton variant="secondary" onClick={() => { setPage("book"); window.scrollTo(0,0); }}>Explore the Book</CTAButton>
                  </div>
                </Reveal>
              </div>
              <Reveal delay={0.2}>
                <div style={{ flex: "0 0 auto" }}>
                  <img src={IMG_PORTRAIT} alt="Pim Schachtschabel" style={{
                    width: "clamp(260px, 30vw, 360px)", height: "clamp(260px, 30vw, 360px)",
                    objectFit: "cover", filter: "contrast(1.02) saturate(0.95)",
                  }} />
                </div>
              </Reveal>
            </div>
          </section>

          {/* Manifesto */}
          <section style={{ background: COLORS.bgAlt, padding: "96px 32px" }}>
            <div style={{ maxWidth: 720, margin: "0 auto" }}>
              <Reveal>
                <p style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(20px, 3vw, 26px)",
                  lineHeight: 1.7, color: COLORS.text, marginBottom: 28,
                }}>We live in a world that rewards certainty — fast answers, proven methods, predictable outcomes. But the most alive people, teams, and experiences share something that certainty can't produce: <em>wonder</em>.</p>
              </Reveal>
              <Reveal delay={0.1}>
                <p style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 16, lineHeight: 1.8,
                  color: COLORS.textLight, marginBottom: 24,
                }}>I've spent over a decade building places where curiosity comes alive — escape rooms, World Expo pavilions, immersive brand experiences. And then I got curious about curiosity itself. What I found, through 75+ research conversations across cultures and disciplines, is that curiosity is not a personality trait. It's a quality of attention. And like anything worth designing, it can be practiced, trained, and built.</p>
              </Reveal>
            </div>
          </section>

          {/* Credentials */}
          <section style={{ padding: "48px 32px", borderBottom: `1px solid ${COLORS.border}` }}>
            <div style={{
              maxWidth: 1000, margin: "0 auto", display: "flex",
              justifyContent: "center", flexWrap: "wrap", gap: "16px 40px", alignItems: "center",
            }}>
              {["World Expo 2025", "Google", "Rijksmuseum", "Heinz", "ABN-AMRO", "Adyen", "The Social Hub"].map(name => (
                <span key={name} style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 400,
                  letterSpacing: "0.06em", color: COLORS.textLight, textTransform: "uppercase",
                }}>{name}</span>
              ))}
            </div>
          </section>

          {/* Three Pillars */}
          <section style={{ padding: "96px 32px" }}>
            <div style={{
              maxWidth: 1100, margin: "0 auto",
              display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 48,
            }}>
              {[
                { label: "Speak", title: "Designing Wonder", desc: "Keynotes, workshops, and facilitation that don't just inspire — they shift how people pay attention. From TEDx stages to corporate offsites.", link: "speaking", cta: "Explore Speaking" },
                { label: "Read", title: "Architecting Curiosity", desc: "Six embodied principles for designing a life of wonder. Born from 75+ research conversations and ten years of building immersive experiences. Coming soon.", link: "book", cta: "Explore the Book" },
                { label: "Work", title: "Experience Design", desc: "As Design Director at Tellart, Pim leads holistic experience design for cultural and brand projects — most recently the Netherlands and Philippine Pavilions at World Expo 2025.", link: null, cta: "See Selected Work" },
              ].map((pillar, i) => (
                <Reveal key={pillar.label} delay={i * 0.12}>
                  <div style={{
                    padding: "40px 32px", border: `1px solid ${COLORS.border}`,
                    height: "100%", display: "flex", flexDirection: "column", transition: "border-color 0.3s",
                  }}
                    onMouseOver={e => e.currentTarget.style.borderColor = COLORS.accent}
                    onMouseOut={e => e.currentTarget.style.borderColor = COLORS.border}
                  >
                    <span style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 500,
                      letterSpacing: "0.16em", textTransform: "uppercase", color: COLORS.accent, marginBottom: 16,
                    }}>{pillar.label}</span>
                    <h3 style={{
                      fontFamily: "'Cormorant Garamond', serif", fontSize: 28, fontWeight: 500,
                      color: COLORS.text, marginBottom: 16, lineHeight: 1.3,
                    }}>{pillar.title}</h3>
                    <p style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 15, lineHeight: 1.7,
                      color: COLORS.textLight, flex: 1, marginBottom: 24,
                    }}>{pillar.desc}</p>
                    <button onClick={() => { if (pillar.link) { setPage(pillar.link); window.scrollTo(0,0); } }}
                      style={{
                        background: "none", border: "none", cursor: "pointer",
                        fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
                        color: COLORS.accent, letterSpacing: "0.04em", textAlign: "left", padding: 0,
                      }}>{pillar.cta} {"\u2192"}</button>
                  </div>
                </Reveal>
              ))}
            </div>
          </section>

          {/* 6 Principles Preview */}
          <section style={{ background: COLORS.bgDark, padding: "96px 32px", color: COLORS.cream }}>
            <div style={{ maxWidth: 800, margin: "0 auto", textAlign: "center" }}>
              <Reveal>
                <h2 style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(28px, 4vw, 40px)",
                  fontWeight: 400, marginBottom: 20, lineHeight: 1.3,
                }}>The 6 Principles of Curiosity</h2>
              </Reveal>
              <Reveal delay={0.1}>
                <p style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 16, lineHeight: 1.7,
                  color: "rgba(248,244,239,0.7)", marginBottom: 48, maxWidth: 560, margin: "0 auto 48px",
                }}>A framework for designing wonder — in yourself, your teams, and the experiences you create for others.</p>
              </Reveal>
              <div style={{
                display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 24, marginBottom: 48,
              }}>
                {[
                  { name: "Observing", stage: "Sowing" },
                  { name: "Suspending", stage: "Sowing" },
                  { name: "Apprenticing", stage: "Growing" },
                  { name: "Ritualizing", stage: "Growing" },
                  { name: "Gracing", stage: "Letting Go" },
                  { name: "Flowing", stage: "Letting Go" },
                ].map((p, i) => (
                  <Reveal key={p.name} delay={0.2 + i * 0.08}>
                    <div style={{ padding: "24px 8px" }}>
                      <p style={{
                        fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 500,
                        letterSpacing: "0.14em", textTransform: "uppercase", color: COLORS.accentLight, marginBottom: 8,
                      }}>{p.stage}</p>
                      <p style={{
                        fontFamily: "'Cormorant Garamond', serif", fontSize: 22,
                        fontWeight: 500, fontStyle: "italic", color: COLORS.cream,
                      }}>{p.name}</p>
                    </div>
                  </Reveal>
                ))}
              </div>
              <Reveal delay={0.6}>
                <p style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: 18,
                  fontStyle: "italic", color: "rgba(248,244,239,0.6)", marginBottom: 40,
                }}>These are verbs, not nouns. Things you do, not things you know.</p>
                <button onClick={() => { setPage("book"); window.scrollTo(0,0); }} style={{
                  background: "transparent", border: "1px solid rgba(248,244,239,0.4)",
                  color: COLORS.cream, padding: "14px 32px",
                  fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 400,
                  letterSpacing: "0.08em", textTransform: "uppercase", cursor: "pointer", transition: "all 0.3s",
                }}
                  onMouseOver={e => { e.target.style.borderColor = COLORS.accentLight; e.target.style.color = COLORS.accentLight; }}
                  onMouseOut={e => { e.target.style.borderColor = "rgba(248,244,239,0.4)"; e.target.style.color = COLORS.cream; }}
                >Learn More in the Book {"\u2192"}</button>
              </Reveal>
            </div>
          </section>

          {/* Testimonial */}
          <section style={{ padding: "96px 32px" }}>
            <div style={{ maxWidth: 700, margin: "0 auto", textAlign: "center" }}>
              <Reveal>
                <p style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(22px, 3vw, 28px)",
                  fontStyle: "italic", lineHeight: 1.6, color: COLORS.text, marginBottom: 24,
                }}>"One of the best experience designers I know. His attention to beautiful detail, gift for creating intricate and engaging narratives, and designing inherently personal experiences is second to none."</p>
                <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 500, color: COLORS.accent }}>David Cranmer</p>
                <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: COLORS.textLight }}>Cal Poly University</p>
              </Reveal>
            </div>
          </section>

          {/* Selected Work */}
          <section style={{ padding: "0 32px 96px" }}>
            <div style={{ maxWidth: 1100, margin: "0 auto" }}>
              <Reveal>
                <h2 style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 400,
                  color: COLORS.text, marginBottom: 48, textAlign: "center",
                }}>Selected Work</h2>
              </Reveal>
              <div style={{
                display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 32,
              }}>
                {[
                  { title: "World Expo 2025 Osaka", desc: "Directing the guest experience for the Philippines Pavilion at World Expo 2025.", img: IMG_EXPO },
                  { title: "Sherlocked", desc: "Co-founded the #1 escape room in Amsterdam. Pioneering experience design around mystery, revelation, and play.", img: IMG_SHERLOCKED },
                  { title: "Wild Dining", desc: "Reimagined the dinner ritual in unexpected locations — turning ordinary spaces into places of wonder.", img: IMG_WILDDINING },
                ].map((work, i) => (
                  <Reveal key={work.title} delay={i * 0.12}>
                    <div style={{ overflow: "hidden", cursor: "pointer" }}>
                      <div style={{ overflow: "hidden", height: 220 }}>
                        <img src={work.img} alt={work.title} style={{
                          width: "100%", height: "100%", objectFit: "cover",
                          transition: "transform 0.5s ease",
                        }}
                          onMouseOver={e => e.target.style.transform = "scale(1.05)"}
                          onMouseOut={e => e.target.style.transform = "scale(1)"}
                        />
                      </div>
                      <div style={{ padding: "20px 0" }}>
                        <h3 style={{
                          fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 500,
                          color: COLORS.text, marginBottom: 8,
                        }}>{work.title}</h3>
                        <p style={{
                          fontFamily: "'DM Sans', sans-serif", fontSize: 15, lineHeight: 1.6, color: COLORS.textLight,
                        }}>{work.desc}</p>
                      </div>
                    </div>
                  </Reveal>
                ))}
              </div>
            </div>
          </section>

          {/* Newsletter */}
          <section style={{ background: COLORS.bgAlt, padding: "80px 32px" }}>
            <div style={{ maxWidth: 520, margin: "0 auto", textAlign: "center" }}>
              <Reveal>
                <h2 style={{
                  fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 400,
                  color: COLORS.text, marginBottom: 16,
                }}>Get the occasional letter</h2>
                <p style={{
                  fontFamily: "'DM Sans', sans-serif", fontSize: 15, lineHeight: 1.7,
                  color: COLORS.textLight, marginBottom: 32,
                }}>Thoughts on curiosity, experience design, and what happens when you pay attention. No noise, no schedule — just a note when there's something worth sharing.</p>
                <div style={{ display: "flex", gap: 8, maxWidth: 420, margin: "0 auto" }}>
                  <input type="email" placeholder="Your email" style={{
                    flex: 1, padding: "14px 16px", border: `1px solid ${COLORS.border}`,
                    background: COLORS.white, fontFamily: "'DM Sans', sans-serif",
                    fontSize: 14, color: COLORS.text, outline: "none",
                  }} />
                  <CTAButton>Sign Up</CTAButton>
                </div>
              </Reveal>
            </div>
          </section>
        </div>
      );
    }

    // ============ ABOUT PAGE ============
    function AboutPage() {
      return (
        <div>
          <section style={{ padding: "160px 32px 80px", maxWidth: 800, margin: "0 auto" }}>
            <Reveal>
              <p style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
                letterSpacing: "0.12em", textTransform: "uppercase", color: COLORS.accent, marginBottom: 24,
              }}>About</p>
            </Reveal>
            <Reveal delay={0.1}>
              <h1 style={{
                fontFamily: "'Cormorant Garamond', serif", fontSize: "clamp(32px, 5vw, 48px)",
                fontWeight: 400, lineHeight: 1.3, color: COLORS.text, marginBottom: 16,
              }}>Pim Schachtschabel</h1>
              <p style={{
                fontFamily: "'Cormorant Garamond', serif", fontSize: 22,
                fontStyle: "italic", color: COLORS.textLight, marginBottom: 48,
              }}>Architect of Curiosity</p>
            </Reveal>
            <Reveal delay={0.2}>
              <img src={IMG_PORTRAIT} alt="Pim Schachtschabel" style={{
                width: "100%", maxWidth: 500, height: "auto", marginBottom: 64, display: "block",
              }} />
            </Reveal>
          </section>

          <section style={{ padding: "0 32px 96px", maxWidth: 680, margin: "0 auto" }}>
            {[
              { text: "I design experiences that make people curious — and then I got curious about curiosity itself.", lead: true },
              { text: "That's probably the simplest way to tell this story. The longer version goes something like this:" },
              { text: "I trained as an architect at Delft University of Technology, where I learned that the shape of a room determines what happens inside it. The height of a ceiling changes whether you feel expansive or intimate. The placement of a door determines where your eye goes first. The quality of light decides whether you linger or rush through. I became fascinated not just by how spaces look, but by how they feel — and what you could make people feel if you designed with enough care." },
              { text: "That fascination led me in directions no one predicted. In 2014, I co-founded Sherlocked — what became the #1 escape room in Amsterdam and one of the most acclaimed in Europe. We designed experiences where strangers walked into a room as individuals and walked out as collaborators, having solved mysteries together that they couldn't have solved alone. I learned more about human curiosity in those rooms than in any classroom: how people open up when they feel safe, how a well-placed question can change the energy of a group, how the moment of almost knowing is more powerful than the answer itself." },
              { text: "From there, the work kept expanding. I designed Wild Dining — an experience that reimagined the dinner ritual in unexpected locations, including the toilets of a moving train. I co-created Stone Soup, an international community bringing creators together to prototype experiences. I designed a royal experience for the Dutch King. And I joined Tellart as Design Director, where I now lead holistic experience design for major cultural and brand projects — most recently directing the guest experience for both the Netherlands Pavilion and the Philippine Pavilion at World Expo 2025 in Osaka." },
              { text: "Along the way, the client list grew: Google, Heinz, ABN-AMRO, Rijksmuseum, JDE, Adyen, The Social Hub. Each project taught me something about the mechanics of wonder — what makes people lean in, what makes them forget they're being designed for, what makes an experience stay in someone's body long after they've left the room." },
              { text: "And then the pandemic happened.", break: true },
              { text: "In April 2020, locked down in San Francisco, I started a conversation with my collaborator Anthony Rocco that became the most important project of my life. We asked a simple question: Can curiosity be designed — not just in a room, but in a life?" },
              { text: "Over the next year, together with Monica Canfield-Lenfest, we held more than 75 carefully designed conversations — we called them Interview Rituals — with people across cultures, backgrounds, and disciplines. These weren't standard interviews. They were experiences: each guest brought a meaningful song, we listened together, and then we explored four curated questions about how curiosity shows up in their lives. What we found changed everything." },
              { text: "The most alive, creative, and present people we spoke with didn't have more answers. They had a different quality of attention. They had learned to observe without grasping, to open without losing themselves, to practice without performing, and to hold their lives with beauty and ease." },
              { text: "From those conversations, six principles emerged — Observing, Suspending, Apprenticing, Ritualizing, Gracing, Flowing — that form the framework of our upcoming book, Architecting Curiosity, and the foundation of everything I now teach and speak about." },
              { text: "These days, my work has a single throughline: helping people and organizations design the conditions where curiosity comes alive. Sometimes that means designing a World Expo pavilion. Sometimes it means facilitating a workshop where a leadership team rediscovers how to ask real questions. Sometimes it means standing on a stage and inviting 500 people to close their eyes and actually notice what they're sensing right now." },

              { text: "I live in Amsterdam. I play the cello, climb rocks outdoors, and meditate most mornings. I believe a flower doesn't have to try to be a flower — it just is. And I believe the same is true for your curiosity." },
            ].map((para, i) => (
              <Reveal key={i} delay={Math.min(i * 0.03, 0.3)}>

                <p style={{

              <div style={{ margin: "40px 0", textAlign: "center" }}>
                <img src={IMG_TINTYPE} alt="Pim Schachtschabel — portrait" style={{
